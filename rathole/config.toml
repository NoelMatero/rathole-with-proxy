[server]
#   2 # This secret is used to sign and verify the JSON Web Tokens.
#3 # You can change this to any secret string you want.
jwt_secret = "your-super-secret-and-long-jwt-secret"
#   5
#6 # The bind_addr for the main rathole server (not used by the axum server in main.rs)
bind_addr = "127.0.0.1:8000"
#8
[server.services.test]
# This defines a service named "test", which the client in src/bin/client.rs
# is hardcoded to use.
bind_addr = "127.0.0.1:9000" # The local address this service would forward to (for the legacy server)
token = "dummy-token"        # Required by the config validation, but not used for JWT auth
